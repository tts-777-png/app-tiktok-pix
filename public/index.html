<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivePix Auto Peças | Direto do Fabricante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ml-yellow: #fff159; --ml-blue: #3483fa; --ml-green: #00a650; --bg-gray: #ebebeb; }
        * { box-sizing: border-box; font-family: 'Proxima Nova', -apple-system, sans-serif; }
        body { background-color: var(--bg-gray); margin: 0; padding: 0; }

        /* Cabeçalho Amarelo ML */
        header { background-color: var(--ml-yellow); padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-text { font-weight: bold; font-size: 18px; color: #333; margin: 0; }
        .slogan { font-size: 10px; color: #666; margin-top: -3px; }
        
        .search-box { background: white; border-radius: 4px; display: flex; align-items: center; padding: 8px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .search-box i { color: #aaa; margin-right: 10px; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; color: #333; }

        .location-bar { display: flex; align-items: center; padding: 8px 15px; background: var(--ml-yellow); border-top: 1px solid rgba(0,0,0,0.05); font-size: 12px; color: #333; }
        .location-bar i { margin-right: 5px; color: #666; }

        /* Grid de Produtos - 2 Colunas no Mobile */
        .container { padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .product-card { background: white; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; position: relative; text-decoration: none; color: inherit; }
        .tag-vendido { background: #ff7733; color: white; font-size: 10px; font-weight: bold; padding: 2px 8px; text-transform: uppercase; width: fit-content; margin: 10px 0 5px 0; border-radius: 0 2px 2px 0; }
        
        .img-container { height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; border-top: 1px solid #f5f5f5; }
        .title { font-size: 13px; color: #333; margin: 0; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.2; font-weight: normal; }
        
        .rating { color: var(--ml-blue); font-size: 12px; margin: 5px 0; }
        .old-price { font-size: 11px; color: #999; text-decoration: line-through; margin-bottom: -2px; }
        
        .price-row { display: flex; align-items: baseline; gap: 4px; margin-top: 2px; }
        .price-symbol { font-size: 14px; font-weight: 400; }
        .price-main { font-size: 20px; font-weight: 400; }
        .price-cents { font-size: 10px; font-weight: 400; position: relative; top: -6px; }
        .off-tag { color: var(--ml-green); font-size: 12px; font-weight: 500; }
        
        .free-shipping { color: var(--ml-green); font-size: 12px; font-weight: 500; margin-top: 5px; }

        /* Carrinho Flutuante */
        .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--ml-blue); color: white; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1001; cursor: pointer; }
        .cart-count { position: absolute; top: 10px; right: 10px; background: white; color: var(--ml-blue); font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }

        /* Botão Comprar */
        .btn-add { background: rgba(52, 131, 250, 0.1); color: var(--ml-blue); border: none; padding: 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo-area">
            <span class="logo-text">LivePix <span style="font-weight: 400;">Auto Peças</span></span>
            <span class="slogan">peças direto do fabricante</span>
        </div>
        <i class="fas fa-bars" style="font-size: 20px; color: #333;"></i>
        <i class="fas fa-shopping-cart" style="font-size: 20px; color: #333;" onclick="toggleCart()"></i>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Estou buscando...">
    </div>
</header>
<div class="location-bar">
    <i class="fas fa-map-marker-alt"></i> Enviar para São Paulo 01011000
</div>

<div class="container">
    <p style="font-size: 12px; color: #666; margin: 10px 0;">Mais vendidos em <b>Motos</b> <i class="fas fa-chevron-down" style="font-size: 10px;"></i></p>
    
    <div class="grid" id="productGrid"></div>
</div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-bolt" style="font-size: 24px;"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<script>
    const dbPecas = [
        { id: 1, tag: "1º MAIS VENDIDO", nome: "Retrovisor Kawasaki Z400 Rebaixado Haste Curta Titan 160", preco: 39.90, de: 107.25, off: "62% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_618042-MLB78898652775_092024-F.webp" },
        { id: 2, tag: "2º MAIS VENDIDO", nome: "Retrovisor Bmw Gs F800 Rebaixado Haste Curta Ou Fixa", preco: 39.76, de: 92.47, off: "57% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_825701-MLB50065636034_052022-F.webp" },
        { id: 3, tag: "3º MAIS VENDIDO", nome: "Retrovisor F800 Honda Par Bmw Fixo Titan 160 150 Fan", preco: 37.04, de: 58.97, off: "37% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_910080-MLB54941913702_042023-F.webp" },
        { id: 4, tag: "4º MAIS VENDIDO", nome: "Par Retrovisor Fixo Convexo Tiger 1200 Rosca Honda", preco: 44.51, de: 59.89, off: "25% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_853503-MLB51978280621_102022-F.webp" },
        { id: 5, nome: "Kit 4 Pisca Seta Moto CG 150 Titan Fan Modelo Original", preco: 31.60, de: 45.90, off: "31% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_607047-MLB48418042571_122021-O.webp" },
        { id: 6, nome: "Bateria Moura MA6-D Selada Original CG 150 Titan", preco: 289.00, de: 350.00, off: "17% OFF", img: "https://http2.mlstatic.com/D_NQ_NP_2X_831676-MLB99292842207_112025-F.webp" }
    ];

    let cartCount = 0;
    let totalValue = 0;

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = dbPecas.map(p => {
            const [inteiro, centavos] = p.preco.toFixed(2).split('.');
            return `
                <div class="product-card" onclick="addToCart(${p.preco})">
                    <div class="img-container"><img src="${p.img}"></div>
                    <div class="info">
                        ${p.tag ? `<div class="tag-vendido">${p.tag}</div>` : ''}
                        <h2 class="title">${p.nome}</h2>
                        <div class="rating"><i class="fas fa-star"></i> 4.8</div>
                        <div class="old-price">R$ ${p.de.toFixed(2)}</div>
                        <div class="price-row">
                            <span class="price-symbol">R$</span>
                            <span class="price-main">${inteiro}</span>
                            <span class="price-cents">${centavos}</span>
                            <span class="off-tag">${p.off}</span>
                        </div>
                        <div class="free-shipping">Frete grátis</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function addToCart(preco) {
        cartCount++;
        totalValue += preco;
        document.getElementById('cartCount').innerText = cartCount;
        // Pequena animação no ícone de raio para feedback
        const float = document.querySelector('.cart-float');
        float.style.transform = 'scale(1.2)';
        setTimeout(() => float.style.transform = 'scale(1)', 200);
    }

    async function checkout() {
        if (totalValue === 0) return alert("Adicione produtos ao carrinho!");
        
        const float = document.querySelector('.cart-float');
        float.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            const res = await fetch('/.netlify/functions/pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valor: totalValue })
            });
            const data = await res.json();
            if (data.paymentUrl) window.location.href = data.paymentUrl;
        } catch (e) {
            alert("Erro de conexão");
            float.innerHTML = '<i class="fas fa-bolt" style="font-size: 24px;"></i>';
        }
    }

    render();
</script>
</body>
</html>
