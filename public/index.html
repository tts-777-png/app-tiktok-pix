<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivePix Auto Peças | Direto do Fabricante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ml-yellow: #fff159; --ml-blue: #3483fa; --ml-green: #00a650; --bg-gray: #ebebeb; }
        * { box-sizing: border-box; font-family: 'Proxima Nova', -apple-system, sans-serif; }
        body { background-color: var(--bg-gray); margin: 0; overflow-x: hidden; }

        /* Header e Busca */
        header { background-color: var(--ml-yellow); padding: 10px 15px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-text { font-weight: bold; font-size: 18px; color: #333; }
        .search-box { background: white; border-radius: 4px; display: flex; align-items: center; padding: 8px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; margin-left: 10px; }

        /* Grid de 2 Colunas */
        .container { padding: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .product-card { background: white; border-radius: 4px; display: flex; flex-direction: column; cursor: pointer; }
        .tag-vendido { background: #ff7733; color: white; font-size: 9px; font-weight: bold; padding: 2px 6px; width: fit-content; margin-top: 8px; border-radius: 0 2px 2px 0; }
        .img-container { height: 150px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; }
        .info { padding: 10px; border-top: 1px solid #f5f5f5; }
        .title { font-size: 13px; color: #333; height: 32px; overflow: hidden; line-height: 1.2; font-weight: 400; margin: 0; }
        .price-main { font-size: 19px; font-weight: 400; }
        .price-cents { font-size: 10px; position: relative; top: -5px; }
        .free-shipping { color: var(--ml-green); font-size: 12px; font-weight: 500; margin-top: 4px; }

        /* Menu Lateral (Sanduíche) */
        .menu-overlay { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; transition: 0.3s; }
        .menu-side { width: 80%; max-width: 300px; height: 100%; background: white; padding: 20px; position: relative; }
        .menu-overlay.active { left: 0; }
        .menu-side h2 { font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .menu-item { padding: 15px 0; border-bottom: 1px solid #f5f5f5; color: #333; text-decoration: none; display: block; }

        /* Detalhes do Produto (Modal) */
        .modal-product { position: fixed; bottom: -100%; left: 0; width: 100%; height: 90%; background: white; z-index: 1500; transition: 0.4s; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
        .modal-product.active { bottom: 0; }
        .close-modal { float: right; font-size: 24px; color: #999; }
        .btn-add-cart { background: var(--ml-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 20px; }

        /* Botão Flutuante de PIX */
        .cart-float { position: fixed; bottom: 20px; right: 20px; background: var(--ml-blue); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1001; cursor: pointer; }
        .cart-count { position: absolute; top: 8px; right: 8px; background: #ff0050; color: white; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
    </style>
</head>
<body>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()">
    <div class="menu-side" onclick="event.stopPropagation()">
        <h2 class="logo-text">LivePix Auto Peças</h2>
        <a href="#" class="menu-item"><i class="fas fa-home"></i> Início</a>
        <a href="#" class="menu-item"><i class="fas fa-motorcycle"></i> Ver Peças</a>
        <a href="#" class="menu-item"><i class="fas fa-history"></i> Meus Pedidos</a>
        <a href="#" class="menu-item"><i class="fas fa-headset"></i> Suporte</a>
    </div>
</div>

<header>
    <div class="header-top">
        <i class="fas fa-bars" onclick="toggleMenu()" style="font-size: 22px; cursor: pointer;"></i>
        <div class="logo-area">
            <span class="logo-text">LivePix <span style="font-weight: 400;">Auto Peças</span></span>
        </div>
        <i class="fas fa-shopping-cart" onclick="toggleCart()" style="font-size: 20px;"></i>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Buscar no LivePix Auto Peças">
    </div>
</header>

<div class="container">
    <div class="grid" id="productGrid"></div>
</div>

<div class="modal-product" id="productModal">
    <span class="close-modal" onclick="closeProduct()">&times;</span>
    <div id="modalContent"></div>
    <button class="btn-add-cart" onclick="addToCartFromModal()">Adicionar ao Carrinho</button>
</div>

<div class="cart-float" onclick="checkout()">
    <i class="fas fa-bolt" style="font-size: 26px;"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<script>
    const dbPecas = [
        { id: 1, tag: "1º MAIS VENDIDO", nome: "Retrovisor Kawasaki Z400 Rebaixado Haste Curta", preco: 39.90, de: 107.25, off: "62% OFF", desc: "Retrovisor premium com haste curta para evitar vibrações. Encaixe perfeito em Titan 160, 150 e Fan. Material de alta resistência.", img: "https://http2.mlstatic.com/D_NQ_NP_2X_618042-MLB78898652775_092024-F.webp" },
        { id: 2, tag: "2º MAIS VENDIDO", nome: "Retrovisor Bmw Gs F800 Rebaixado Haste Fixa", preco: 39.76, de: 92.47, off: "57% OFF", desc: "Estilo esportivo BMW. Haste fixa para maior estabilidade em altas velocidades. Lente convexa para melhor visão.", img: "https://http2.mlstatic.com/D_NQ_NP_2X_825701-MLB50065636034_052022-F.webp" },
        { id: 3, tag: "3º MAIS VENDIDO", nome: "Kit 4 Setas Piscas Modelo Original - CG 150", preco: 31.60, de: 45.90, off: "31% OFF", desc: "Kit completo (4 unidades) com lente âmbar. Plástico ABS injetado, seguindo as medidas originais Honda.", img: "https://http2.mlstatic.com/D_NQ_NP_2X_607047-MLB48418042571_122021-O.webp" },
        { id: 4, tag: "4º MAIS VENDIDO", nome: "Bateria Moura MA6-D Selada Original", preco: 289.00, de: 350.00, off: "17% OFF", desc: "Tecnologia de ponta Moura. Livre de manutenção. 6 meses de garantia nacional.", img: "https://http2.mlstatic.com/D_NQ_NP_2X_831676-MLB99292842207_112025-F.webp" }
    ];

    let cart = [];
    let currentProduct = null;

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = dbPecas.map(p => {
            const [inteiro, centavos] = p.preco.toFixed(2).split('.');
            return `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="img-container"><img src="${p.img}"></div>
                    <div class="info">
                        ${p.tag ? `<div class="tag-vendido">${p.tag}</div>` : ''}
                        <h2 class="title">${p.nome}</h2>
                        <div class="price-row" style="display:flex; align-items:baseline; gap:3px; margin-top:5px;">
                            <span style="font-size:12px">R$</span>
                            <span class="price-main">${inteiro}</span>
                            <span class="price-cents">${centavos}</span>
                            <span style="color:var(--ml-green); font-size:11px; font-weight:500;">${p.off}</span>
                        </div>
                        <div class="free-shipping">Frete grátis</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openProduct(id) {
        currentProduct = dbPecas.find(p => p.id === id);
        const [inteiro, centavos] = currentProduct.preco.toFixed(2).split('.');
        document.getElementById('modalContent').innerHTML = `
            <img src="${currentProduct.img}" style="width:100%; height:250px; object-fit:contain;">
            <h2 style="font-size:20px; margin:20px 0 10px 0;">${currentProduct.nome}</h2>
            <div style="font-size:28px; font-weight:bold;">R$ ${inteiro}<span style="font-size:14px; position:relative; top:-10px;">${centavos}</span></div>
            <p style="color:#666; line-height:1.5; margin-top:15px;">${currentProduct.desc}</p>
        `;
        document.getElementById('productModal').classList.add('active');
    }

    function closeProduct() { document.getElementById('productModal').classList.remove('active'); }
    function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('active'); }

    function addToCartFromModal() {
        cart.push(currentProduct);
        document.getElementById('cartCount').innerText = cart.length;
        closeProduct();
        // Feedback visual
        const float = document.querySelector('.cart-float');
        float.style.transform = 'scale(1.2)';
        setTimeout(() => float.style.transform = 'scale(1)', 200);
    }

    async function checkout() {
        if (cart.length === 0) return alert("Seu carrinho está vazio!");
        const total = cart.reduce((sum, item) => sum + item.preco, 0);
        const float = document.querySelector('.cart-float');
        float.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            const res = await fetch('/.netlify/functions/pix', {
                method: 'POST',
                body: JSON.stringify({ valor: total })
            });
            const data = await res.json();
            if (data.paymentUrl) window.location.href = data.paymentUrl;
        } catch (e) {
            alert("Erro na conexão");
            float.innerHTML = '<i class="fas fa-bolt" style="font-size: 26px;"></i>';
        }
    }

    render();
</script>
</body>
</html>
