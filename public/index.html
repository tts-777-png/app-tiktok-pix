<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste LivePix Netlify</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #010101; color: white; }
        .btn-pay { background: #ff0050; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-pay:disabled { background: #555; cursor: not-allowed; }
        .loader { margin-top: 20px; color: #ff0050; display: none; }
    </style>
</head>
<body>
    <h2>App TikTok - Teste de Saque</h2>
    <p>Valor da taxa: R$ 21,67</p>
    
    <button class="btn-pay" id="payBtn">PAGAR TAXA AGORA</button>
    <div id="loader" class="loader">Gerando pagamento seguro...</div>

    <script>
        const payBtn = document.getElementById('payBtn');
        const loader = document.getElementById('loader');

        payBtn.addEventListener('click', async () => {
            // Feedback visual
            payBtn.innerText = "PROCESSANDO...";
            payBtn.disabled = true;
            loader.style.display = "block";

            try {
                const response = await fetch('/.netlify/functions/pix');
                const data = await response.json();

                if (data.paymentUrl) {
                    // Redireciona para o Checkout oficial da LivePix
                    window.location.href = data.paymentUrl;
                } else {
                    throw new Error(data.message || "Erro desconhecido");
                }
            } catch (err) {
                console.error("Erro:", err);
                alert("Erro ao gerar pagamento: " + err.message);
                payBtn.innerText = "PAGAR TAXA AGORA";
                payBtn.disabled = false;
                loader.style.display = "none";
            }
        });
    </script>
</body>
</html>
