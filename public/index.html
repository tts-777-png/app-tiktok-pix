<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas E-com Test</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; text-align: center; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .produto { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .preco { color: #00f2ea; font-size: 24px; font-weight: bold; margin: 10px 0; }
        .btn-comprar { background: #ff0050; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-comprar:disabled { background: #555; }
    </style>
</head>
<body>
    <h1>🛒 Minha Loja Teste</h1>
    <p>Escolha um produto para testar o checkout dinâmico:</p>

    <div class="vitrine">
        <div class="produto">
            <h3>Plano Bronze</h3>
            <p class="preco">R$ 10,00</p>
            <button class="btn-comprar" onclick="checkout(10.00, this)">COMPRAR AGORA</button>
        </div>
        <div class="produto">
            <h3>Plano Prata</h3>
            <p class="preco">R$ 50,00</p>
            <button class="btn-comprar" onclick="checkout(50.00, this)">COMPRAR AGORA</button>
        </div>
        <div class="produto">
            <h3>Plano Ouro</h3>
            <p class="preco">R$ 100,00</p>
            <button class="btn-comprar" onclick="checkout(100.00, this)">COMPRAR AGORA</button>
        </div>
    </div>

    <script>
        async function checkout(valor, botao) {
            const originalText = botao.innerText;
            botao.innerText = "GERANDO PIX...";
            botao.disabled = true;

            try {
                const res = await fetch('/.netlify/functions/pix', {
                    method: 'POST',
                    body: JSON.stringify({ valor: valor })
                });
                const data = await res.json();
                
                if (data.paymentUrl) {
                    window.location.href = data.paymentUrl;
                } else {
                    alert("Erro ao gerar pagamento.");
                    botao.innerText = originalText;
                    botao.disabled = false;
                }
            } catch (err) {
                alert("Erro de conexão.");
                botao.disabled = false;
            }
        }
    </script>
</body>
</html>
