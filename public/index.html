<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotosParts CG 150 - Sua Loja Oficial de Peças</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mp-blue: #009EE3; --mp-dark-blue: #007EB5; --bg-gray: #F5F5F5; --text-gray: #666; --border-gray: #DDD; }
        body { font-family: 'Proxima Nova', -apple-system, Roboto, sans-serif; background: var(--bg-gray); margin: 0; color: #333; }
        
        /* Header - Estilo Mercado Pago */
        header { background: #FFF; padding: 10px 0; border-bottom: 1px solid var(--border-gray); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .logo { font-size: 22px; font-weight: bold; color: var(--mp-blue); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo i { font-size: 28px; }
        .search-bar { flex: 1; max-width: 500px; position: relative; display: flex; }
        .search-bar input { width: 100%; padding: 10px 15px 10px 40px; border: 1px solid var(--border-gray); border-radius: 20px; font-size: 14px; outline: none; }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }
        .nav-icons { display: flex; align-items: center; gap: 20px; color: var(--text-gray); cursor: pointer; }

        /* Vitrine */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .category-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #333; border-left: 4px solid var(--mp-blue); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .product-card { background: #FFF; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-gray); transition: box-shadow 0.3s; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 180px; background: #FFF; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border-gray); padding: 10px; box-sizing: border-box; }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-info { padding: 15px; text-align: left; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-title { font-size: 15px; margin: 0 0 10px 0; font-weight: 400; color: #333; height: 36px; overflow: hidden; }
        .product-price { color: #333; font-size: 20px; font-weight: 600; margin: 0 0 15px 0; }
        
        .btn-buy { background: var(--mp-blue); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-buy:hover { background: var(--mp-dark-blue); }
        .btn-buy:disabled { background: #CCC; cursor: not-allowed; }

        /* Carrinho Lateral */
        #cart-sidebar { position: fixed; right: -350px; top: 0; width: 350px; height: 100%; background: #FFF; box-shadow: -5px 0 15px rgba(0,0,0,0.2); z-index: 2000; transition: right 0.3s; display: flex; flex-direction: column; }
        #cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border-gray); display: flex; justify-content: space-between; align-items: center; background: var(--bg-gray); }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 10px; }
        .cart-item-img { width: 50px; height: 50px; object-fit: contain; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--border-gray); background: var(--bg-gray); }
        .btn-checkout { background: #00A650; color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="#" class="logo">
            <i class="fas fa-motorcycle"></i> MotoParts<span style="font-weight: 400; color: #333;">CG150</span>
        </a>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar peças... (ex: seta, pistão, embreagem)">
        </div>
        <div class="nav-icons" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </div>
</header>

<div class="container">
    <h3 class="category-title">Manutenção e Elétrica</h3>
    <div class="grid" id="elétrica-grid"></div>

    <h3 class="category-title">Peças de Motor</h3>
    <div class="grid" id="motor-grid"></div>

    <h3 class="category-title">Chassi e Carenagem</h3>
    <div class="grid" id="chassi-grid"></div>
</div>

<div id="cart-sidebar">
    <div class="cart-header">
        <h3>Meu Carrinho</h3>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor: pointer;"></i>
    </div>
    <div class="cart-items" id="cart-items">
        <p style="text-align: center; color: var(--text-gray);">Carrinho vazio.</p>
    </div>
    <div class="cart-footer">
        <p style="display: flex; justify-content: space-between;">Total: <span id="cart-total">R$ 0,00</span></p>
        <button class="btn-checkout" id="checkoutBtn" onclick="processarCompra()" disabled>Finalizar Compra via PIX</button>
    </div>
</div>

<script>
    // Banco de Dados de Peças CG 150 Titan/Fan (Imagens Ilustrativas)
    const dbPecas = [
        // Elétrica e Manutenção
        { id: 1, cat: 'elétrica', nome: "Kit 4 Setas Completas (Pisca) Lente Laranja - CG 150", preco: 39.90, img: "https://img.lojadomecanico.com.br/250x250/203201/kit-pisca-seta-completo-cg-150-titan-mix-fan-150-fan-125-kit-04-pecas-lente-amarela-scud-10130001.jpg" },
        { id: 2, cat: 'elétrica', nome: "Bateria Moura MA6-D (Selada) - CG 150 Titan/Fan", preco: 289.00, img: "https://bateriasmoura.vtexassets.com/arquivos/ids/155554/Bateria-Moura-Moto-MA6-D_34.jpg?v=637817926868830000" },
        { id: 3, cat: 'elétrica', nome: "Vela de Ignição NGK Resisiva - CG 150", preco: 25.90, img: "https://img.lojadomecanico.com.br/250x250/30713/vela-de-ignicao-resistiva-ngk-cpr8ea-9-cpr8ea-9.jpg" },
        { id: 4, cat: 'elétrica', nome: "Lâmpada Farol H4 35/35W Super Branca - CG 150", preco: 19.90, img: "https://img.lojadomecanico.com.br/250x250/142999/lampada-h4-3535w-12v-super-branca-para-moto-philips-12342bvb1.jpg" },
        
        // Motor
        { id: 5, cat: 'motor', nome: "Kit Cilindro, Pistão e Anéis Standard - CG 150 Titan/Fan", preco: 349.00, img: "https://img.lojadomecanico.com.br/250x250/127116/kit-motor-cilindro-pistao-aneis-std-cg-150-titan-mix-job-fan-150-metalking-mtk1002.jpg" },
        { id: 6, cat: 'motor', nome: "Kit Embreagem Completo (Discos, Platô, Cubo) - CG 150", preco: 189.00, img: "https://img.lojadomecanico.com.br/250x250/132145/kit-embreagem-completo-cg-150-titan-fan-150-scud-10080001.jpg" },
        { id: 7, cat: 'motor', nome: "Carburador Completo (Modelo Original) - CG 150 Titan 2004-2008", preco: 220.00, img: "https://img.lojadomecanico.com.br/250x250/132146/carburador-completo-cg-150-titan-2004-a-2008-scud-10070001.jpg" },
        { id: 8, cat: 'motor', nome: "Kit Juntas Completo do Motor (Kit A) - CG 150", preco: 45.00, img: "https://img.lojadomecanico.com.br/250x250/215701/kit-juntas-motor-cg-150-titan-fan-scud-10110001.jpg" },
        { id: 9, cat: 'motor', nome: "Bomba de Combustível Refil (Injeção Eletrônica) - CG 150 Mix/Flex", preco: 110.00, img: "https://img.lojadomecanico.com.br/250x250/144123/refil-bomba-combustivel-cg-150-mix-flex-biz-125-flex-bosch-0580453483.jpg" },

        // Chassi
        { id: 10, cat: 'chassi', nome: "Kit Relação Completo (Coroa, Pinhão, Corrente com Retentor) - CG 150 DID/Riffel", preco: 240.00, img: "https://img.lojadomecanico.com.br/250x250/203204/kit-relacao-transmissao-cg-150-titan-mix-job-fan-150-did-riffel-did10100001.jpg" },
        { id: 11, cat: 'chassi', nome: "Amortecedor Traseiro Par (Cofap) - CG 150 Titan/Fan", preco: 399.00, img: "https://img.lojadomecanico.com.br/250x250/203205/par-amortecedor-traseiro-moto-cg-150-titan-fan-cofap-msc41001.jpg" },
        { id: 12, cat: 'chassi', nome: "Par de Espelhos Retrovisores Modelo Original - CG 150", preco: 49.90, img: "https://img.lojadomecanico.com.br/250x250/132147/par-retrovisor-modelo-original-cg-150-titan-fan-scud-10120001.jpg" },
        { id: 13, cat: 'chassi', nome: "Cavalete Central Completo com Eixo e Mola - CG 150", preco: 75.00, img: "https://img.lojadomecanico.com.br/250x250/215703/cavalete-central-cg-150-titan-fan-scud-10090001.jpg" },
        { id: 14, cat: 'chassi', nome: "Kit Carenagem Lateral (Par de Tampas) Vermelho - CG 150 Titan 2008", preco: 130.00, img: "https://img.lojadomecanico.com.br/250x250/215704/par-tampa-lateral-cg-150-titan-2008-vermelho-scud-10140001.jpg" },
        { id: 15, cat: 'chassi', nome: "Pneu Traseiro 90/90-18 (Pirelli Mandrake Due) - CG 150", preco: 215.00, img: "https://img.lojadomecanico.com.br/250x250/215705/pneu-moto-9090-18-57p-mandrake-due-pirelli-21500001.jpg" }
    ];

    let carrinho = [];

    // Função para renderizar a vitrine
    function renderVitrine(pecas) {
        const grids = { elétrica: document.getElementById('elétrica-grid'), motor: document.getElementById('motor-grid'), chassi: document.getElementById('chassi-grid') };
        // Limpa grids
        Object.values(grids).forEach(g => g.innerHTML = '');

        pecas.forEach(p => {
            if (grids[p.cat]) {
                grids[p.cat].innerHTML += `
                    <div class="product-card" data-nome="${p.nome.toLowerCase()}">
                        <div class="product-img"><img src="${p.img}" alt="${p.nome}"></div>
                        <div class="product-info">
                            <p class="product-title">${p.nome}</p>
                            <div>
                                <p class="product-price">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                                <button class="btn-buy" onclick="adicionarAoCarrinho(${p.id})">
                                    <i class="fas fa-cart-plus"></i> Adicionar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
    }

    // Lógica do Carrinho
    function adicionarAoCarrinho(id) {
        const peca = dbPecas.find(p => p.id === id);
        if (peca) {
            carrinho.push(peca);
            atualizarCarrinhoHTML();
            if (!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
        }
    }

    function atualizarCarrinhoHTML() {
        const cartItemsHTML = document.getElementById('cart-items');
        const cartCountHTML = document.getElementById('cart-count');
        const cartTotalHTML = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkoutBtn');

        cartCountHTML.innerText = carrinho.length;

        if (carrinho.length === 0) {
            cartItemsHTML.innerHTML = '<p style="text-align: center; color: var(--text-gray);">Carrinho vazio.</p>';
            cartTotalHTML.innerText = 'R$ 0,00';
            checkoutBtn.disabled = true;
            return;
        }

        checkoutBtn.disabled = false;
        cartItemsHTML.innerHTML = '';
        let total = 0;

        carrinho.forEach((item, index) => {
            total += item.preco;
            cartItemsHTML.innerHTML += `
                <div class="cart-item">
                    <img src="${item.img}" class="cart-item-img">
                    <div style="flex: 1;">
                        <p style="font-size: 13px; margin: 0;">${item.nome}</p>
                        <p style="font-weight: bold; margin: 5px 0 0 0;">R$ ${item.preco.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <i class="fas fa-trash" onclick="removerDoCarrinho(${index})" style="color: #FF4444; cursor: pointer;"></i>
                </div>
            `;
        });

        cartTotalHTML.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function removerDoCarrinho(index) {
        carrinho.splice(index, 1);
        atualizarCarrinhoHTML();
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
    }

    // Busca
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            if (card.getAttribute('data-nome').includes(termo)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });

    // Finalizar Compra (Chama o Backend)
    async function processarCompra() {
        const checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.innerText = "GERANDO PIX SEGURADO...";
        checkoutBtn.disabled = true;

        const total = carrinho.reduce((sum, item) => sum + item.preco, 0);

        try {
            const res = await fetch('/.netlify/functions/pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valor: total, itens: carrinho.length })
            });
            const data = await res.json();
            
            if (data.paymentUrl) {
                // Redireciona para o Checkout Oficial (Estilo Mercado Pago)
                window.location.href = data.paymentUrl;
            } else {
                alert("Erro ao gerar pagamento. Tente novamente.");
                checkoutBtn.innerText = "Finalizar Compra via PIX";
                checkoutBtn.disabled = false;
            }
        } catch (err) {
            alert("Erro de conexão.");
            checkoutBtn.disabled = false;
            checkoutBtn.innerText = "Finalizar Compra via PIX";
        }
    }

    // Inicialização
    renderVitrine(dbPecas);
</script>
</body>
</html>
