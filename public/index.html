<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Store - Tech & Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --bg: #0a0a0a;
            --card: #161616;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background: #000;
            padding: 20px;
            border-bottom: 2px solid var(--primary);
            sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .product-img {
            width: 100%;
            height: 180px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #444;
        }

        .product-info {
            padding: 15px;
            text-align: left;
        }

        .product-title {
            font-size: 18px;
            margin: 0;
            font-weight: 600;
        }

        .product-price {
            color: var(--secondary);
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-buy:hover {
            background: #d60043;
        }

        .btn-buy:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--secondary);
            color: black;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; font-size: 24px;">LUCAS<span style="color: var(--primary);">STORE</span></h1>
            <i class="fas fa-shopping-cart" style="font-size: 20px;"></i>
        </div>
    </header>

    <div class="container">
        <h2 style="text-align: left; margin-bottom: 30px;">Ofertas do Dia</h2>
        <div class="grid" id="vitrine">
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, nome: "Acesso Beta VIP", preco: 2.00, icon: "🚀", promo: "Oferta" },
            { id: 2, nome: "Skin Lendária TikTok", preco: 15.90, icon: "🎭", promo: "Hot" },
            { id: 3, nome: "Pack 5000 Moedas", preco: 29.00, icon: "💰", promo: null },
            { id: 4, nome: "Assinatura Mensal", preco: 49.90, icon: "💎", promo: "Popular" },
            { id: 5, nome: "Fone Bluetooth G-7", preco: 89.00, icon: "🎧", promo: null },
            { id: 6, nome: "Gift Card R$ 100", preco: 100.00, icon: "💳", promo: "Saldo" },
            { id: 7, nome: "Mouse Gamer RGB", preco: 120.00, icon: "🖱️", promo: null },
            { id: 8, nome: "Teclado Mecânico", preco: 199.00, icon: "⌨️", promo: "Limited" },
            { id: 9, nome: "Cadeira Gamer Pro", preco: 850.00, icon: "💺", promo: null },
            { id: 10, nome: "Monitor 144hz 24'", preco: 1100.00, icon: "🖥️", promo: "4K" },
            { id: 11, nome: "Placa de Vídeo RTX", preco: 2500.00, icon: "🔌", promo: "Top" },
            { id: 12, nome: "Console Next Gen", preco: 3800.00, icon: "🎮", promo: "New" }
        ];

        const vitrine = document.getElementById('vitrine');

        produtos.forEach(p => {
            vitrine.innerHTML += `
            <div class="product-card">
                ${p.promo ? `<span class="badge">${p.promo}</span>` : ''}
                <div class="product-img">${p.icon}</div>
                <div class="product-info">
                    <p class="product-title">${p.nome}</p>
                    <p class="product-price">R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                    <button class="btn-buy" onclick="comprar(${p.preco}, this)">
                        <i class="fas fa-bolt"></i> COMPRAR AGORA
                    </button>
                </div>
            </div>
        `;
        });

        async function comprar(valor, botao) {
            botao.disabled = true;
            const textoOriginal = botao.innerHTML;
            botao.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/.netlify/functions/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valor: valor })
                });
                const data = await res.json();
                if (data.paymentUrl) {
                    window.location.href = data.paymentUrl;
                } else {
                    alert("Erro ao processar. Tente novamente.");
                    botao.disabled = false;
                    botao.innerHTML = textoOriginal;
                }
            } catch (err) {
                alert("Erro de conexão.");
                botao.disabled = false;
                botao.innerHTML = textoOriginal;
            }
        }
    </script>
</body>

</html>
